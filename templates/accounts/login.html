<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --primary: rgb(255, 60, 0);
    --primary-dark: rgb(217, 38, 0);
    --primary-darker: rgb(175, 20, 0);
    --primary-darkest: rgb(67, 26, 0);
}

*,
*::before,
*::after {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100svh;
    overflow: hidden;
    background-color: var(--primary);
    font-family: 'Outfit', sans-serif;
}

/* CARD */
.window-card {
    width: 100%;
    max-width: 900px;
    background-color: rgba(255, 255, 255, 0.1);
    overflow: hidden;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(5px);
}

.window-header {
    background-color: rgba(0, 0, 0, 0.15);
    padding: 15px 20px;
    display: flex;
    gap: 8px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.4);
}

.window-content {
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.avatar-circle {
    width: 100px;
    height: 100px;
    background-color: var(--primary-darkest);
    border-radius: 50%;
    margin-bottom: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.avatar-circle svg {
    fill: white;
    width: 50px;
}

form { text-align: center; }

input {
    width: 100%;
    max-width: 370px;
    padding: 18px;
    margin-bottom: 15px;
    border: none;
    outline: none;
    font-size: 18px;
    background-color: #f8f8f8;
    box-sizing: border-box;
}

/* Asterisk password masking */
input[type="password"] {
    -webkit-text-security: asterisk;
    text-security: asterisk;
}

button {
    width: 100%;
    max-width: 370px;
    padding: 18px;
    background-color: rgb(217, 38, 0);
    color: white;
    border: none;
    font-weight: bold;
    font-size: 16px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 2px;
    transition: all 0.3s ease;
}

button:hover {
    background-color: rgb(255, 60, 0);
    transform: translateY(-2px);
}

.messages {
    margin-bottom: 20px;
}

.message {
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 10px;
    background: rgba(255, 60, 0, 0.1);
    color: rgb(175, 20, 0);
    font-size: 14px;
}

/* =========================
   RESPONSIVE BREAKPOINTS
========================= */

/* Tablet */
@media (max-width: 768px) {
    .window-content {
        padding: 50px 30px;
    }

    .avatar-circle {
        width: 80px;
        height: 80px;
    }

    input, button {
        font-size: 16px;
        padding: 14px;
    }
}

/* Mobile */
@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .window-content {
        padding: 35px 20px;
    }

    .avatar-circle {
        width: 65px;
        height: 65px;
        margin-bottom: 25px;
    }

    input, button {
        font-size: 15px;
        padding: 12px;
    }
}
</style>

</head>
<body>

    <div class="window-card">
        <div class="window-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="window-content">
            <div class="avatar-circle">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>

                {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required>
                <input type="text" name="password_display" placeholder="Password" id="pw-display" autocomplete="current-password" required>
                <input type="hidden" name="password" id="pw-hidden">
                <br>
                <button type="submit">Continue</button>
            </form>
        </div>
    </div>
    <script>
    (function () {
        const display = document.getElementById("pw-display");
        const hidden = document.getElementById("pw-hidden");
        if (!display || !hidden) return;

        let realValue = "";

        const sync = () => {
            hidden.value = realValue;
            display.value = "*".repeat(realValue.length);
            const end = display.value.length;
            display.setSelectionRange(end, end);
        };

        display.addEventListener("beforeinput", (e) => {
            if (e.inputType === "insertText" && e.data) {
                realValue += e.data;
            } else if (e.inputType === "deleteContentBackward") {
                realValue = realValue.slice(0, -1);
            } else if (e.inputType === "deleteContentForward") {
                realValue = realValue.slice(0, -1);
            } else if (e.inputType === "insertFromPaste") {
                realValue += e.data || "";
            } else if (e.inputType === "insertCompositionText") {
                realValue += e.data || "";
            }
        });

        display.addEventListener("input", () => {
            sync();
        });

        display.addEventListener("focus", sync);
        display.addEventListener("click", sync);
    })();
    </script>
</body>
</html>
