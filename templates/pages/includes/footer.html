{% load static %}

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        footer {
            width: 100%;
            background: transparent;
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 60, 0, 0.1);
            margin-top: auto;
        }

        footer .container {
            max-width: 100%;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        footer p {
            color: rgb(67, 26, 0);
            font-size: 0.95rem;
            margin: 0;
        }
        footer a {
            color: rgb(255, 60, 0);
            text-decoration: none;
        }
        footer a:hover{
            color: rgb(217, 38, 0);
        }

        footer nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            align-items: center;
        }

        footer nav ul li {
            position: relative;
        }

        footer nav ul li a {
            text-decoration: none;
            color: rgb(67, 26, 0);
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            display: block;
            transition: color 0.3s ease;
            position: relative;
        }

        footer nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, rgb(255, 60, 0), rgb(217, 38, 0));
            transition: width 0.3s ease;
        }

        footer nav ul li a:hover {
            color: rgb(255, 60, 0);
        }

        footer nav ul li a:hover::after {
            width: 80%;
        }

        footer nav ul li a:active {
            color: rgb(175, 20, 0);
        }

        /* Medium screens (md) */
        @media (max-width: 768px) {
            footer .container {
                padding: 0 1.5rem;
            }

            footer nav ul {
                gap: 1.5rem;
            }

            footer nav ul li a {
                font-size: 0.95rem;
                padding: 0.4rem 0.8rem;
            }

            footer p {
                font-size: 0.9rem;
            }
        }

        /* Small screens (sm) */
        @media (max-width: 640px) {
            footer .container {
                flex-direction: column;
                text-align: center;
                padding: 0 1rem;
                gap: 1.5rem;
            }

            footer nav ul {
                flex-direction: column;
                gap: 0.5rem;
            }

            footer nav ul li {
                width: 100%;
            }

            footer nav ul li a {
                padding: 0.75rem 1rem;
                width: 100%;
            }

            footer p {
                font-size: 0.85rem;
                order: 2;
            }

            footer nav {
                order: 1;
            }
        }

        /* Large screens (lg) */
        @media (min-width: 1024px) {
            footer .container {
                padding: 0 3rem;
            }

            footer nav ul {
                gap: 3rem;
            }

            footer nav ul li a {
                font-size: 1.05rem;
            }

            footer p {
                font-size: 1rem;
            }
        }
    </style>


    <footer>
        <div class="container">
            <p>© {% now "Y" %} <a href="http://redback.in/" target="blank">Redback</a>. All rights reserved.</p>

            <nav aria-label="Footer Navigation">
                <ul>
                    <li><a href="{% url 'index' %}">Home</a></li>
                    <li><a href="{% url 'service' %}">Services</a></li>
                    <li><a href="{% url 'contact' %}">Contact</a></li>
                </ul>
            </nav>
        </div>
    </footer>
