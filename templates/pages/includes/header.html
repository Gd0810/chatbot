{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <style>
        header {
            position: static;
            width: 100%;
            background:transparent;
            padding: 1rem 0;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
            overflow: visible;
        }

        header.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 60, 0, 0.1);
            box-shadow: 0 2px 10px rgba(67, 26, 0, 0.1);
        }

        header .container {
            max-width: 100%;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        header .logo {
            display: block;
            transition: transform 0.3s ease;
        }

        header .logo:hover {
            transform: scale(1.05);
        }

        header .logo img {
            height: 100px;
            width: 120px;
            display: block;
            object-fit: contain;
        }

        header .logo .logo-default {
            display: block;
        }

        header .logo .logo-hover {
            display: none;
        }

        header .logo:hover .logo-default {
            display: none;
        }

        header .logo:hover .logo-hover {
            display: block;
        }

        header nav ul {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            align-items: center;
        }
        
        header nav {
            position: static;
            overflow: visible;
        }

        header nav ul li {
            position: relative;
        }

        header nav ul li a {
            text-decoration: none;
            color: rgb(67, 26, 0);
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            display: block;
            transition: color 0.3s ease;
            position: relative;
        }

        header nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, rgb(255, 60, 0), rgb(217, 38, 0));
            transition: width 0.3s ease;
        }

        header nav ul li a:hover {
            color: rgb(255, 60, 0);
        }

        header nav ul li a:hover::after {
            width: 80%;
        }

        header nav ul li a:active {
            color: rgb(175, 20, 0);
        }

        /* Dropdown Styles */
        header nav ul li {
            position: relative;
        }

        header nav ul li .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            min-width: 220px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(67, 26, 0, 0.15);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
            padding: 0.5rem 0;
            margin-top: 0.5rem;
        }

        header nav ul li:hover .dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        header nav ul li .dropdown a {
            padding: 0.75rem 1.5rem;
            color: rgb(67, 26, 0);
            font-size: 0.95rem;
            white-space: nowrap;
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
        }

        header nav ul li .dropdown a:hover {
            background: rgba(255, 60, 0, 0.05);
            border-left-color: rgb(255, 60, 0);
            color: rgb(255, 60, 0);
            padding-left: 2rem;
        }

        header nav ul li .dropdown a::after {
            display: none;
        }

        /* Dropdown arrow indicator */
        header nav ul li.has-dropdown > a::before {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid currentColor;
            margin-left: 6px;
            vertical-align: middle;
            transition: transform 0.3s ease;
        }

        header nav ul li.has-dropdown:hover > a::before {
            transform: rotate(180deg);
        }

        header .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            background: none;
            border: none;
            padding: 0.5rem;
        }

        header .menu-toggle span {
            width: 28px;
            height: 3px;
            background: rgb(67, 26, 0);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        header .menu-toggle:hover span {
            background: rgb(255, 60, 0);
        }

        header .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        header .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        header .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Medium screens (md) */
        @media (max-width: 768px) {
            header .container {
                padding: 0 1.5rem;
            }

            header nav ul {
                gap: 1.5rem;
            }

            header nav ul li a {
                font-size: 0.95rem;
                padding: 0.4rem 0.8rem;
            }

            header .logo img {
                height: 80px;
                width: 80px;
            }
        }

        /* Small screens (sm) */
        @media (max-width: 640px) {
            header .menu-toggle {
                display: flex;
            }
            
            header nav {
                position: relative;
            }

            header nav ul {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(10px);
                gap: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.4s ease, padding 0.4s ease;
                box-shadow: 0 4px 6px rgba(67, 26, 0, 0.1);
                z-index: 1000;
            }

            header nav ul.active {
                max-height: 600px;
                padding: 1rem 0;
            }

            header nav ul li {
                width: 100%;
                text-align: center;
                border-bottom: 1px solid rgba(255, 60, 0, 0.1);
            }

            header nav ul li:last-child {
                border-bottom: none;
            }

            header nav ul li a {
                padding: 1rem;
                width: 100%;
            }

            header nav ul li a::after {
                display: none;
            }

            /* Mobile dropdown styles */
            header nav ul li .dropdown {
                position: static;
                opacity: 1;
                visibility: visible;
                transform: none;
                box-shadow: none;
                background: rgba(255, 60, 0, 0.03);
                margin: 0;
                padding: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
            }

            header nav ul li.dropdown-open .dropdown {
                max-height: 300px;
            }

            header nav ul li .dropdown a {
                padding: 0.75rem 2rem;
                font-size: 0.9rem;
                border-left: none;
                border-bottom: 1px solid rgba(255, 60, 0, 0.1);
            }

            header nav ul li .dropdown a:last-child {
                border-bottom: none;
            }

            header nav ul li .dropdown a:hover {
                padding-left: 2rem;
            }

            header nav ul li.has-dropdown > a::before {
                position: absolute;
                right: 1.5rem;
            }

            header nav ul li.has-dropdown.dropdown-open > a::before {
                transform: rotate(180deg);
            }

            header .logo img {
                height: 80px;
                width: 80px;
            }

            header .container {
                padding: 0 1rem;
            }
        }

        /* Large screens (lg) - enhanced spacing */
        @media (min-width: 1024px) {
            header .container {
                padding: 0 3rem;
            }

            header nav ul {
                gap: 3rem;
            }

            header nav ul li a {
                font-size: 1.05rem;
            }

            header .logo img {
                height: 100px;
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav aria-label="Main Navigation">
            <div class="container">
                <a href="{% url 'index' %}" class="logo">
                    <img src="{% static 'ui/img/redbackai0.png' %}" alt="My Django Website Logo" class="logo-default">
                    <img src="{% static 'ui/img/redbackai1.png' %}" alt="My Django Website Logo" class="logo-hover">
                </a>

                <button class="menu-toggle" aria-label="Toggle menu" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <ul id="navMenu">
                    <li><a href="{% url 'index' %}">Home</a></li>
                    <li><a href="{% url 'about' %}">About</a></li>
                    <li class="has-dropdown">
                        <a href="{% url 'service' %}" onclick="toggleDropdown(event, this)">Services</a>
                        <div class="dropdown">
                            <a href="{% url 'aibot' %}">AI Bot</a>
                            <a href="{% url 'livebot' %}">Live Chatbot</a>
                            <a href="{% url 'faqbot' %}">FAQ Bot</a>
                        </div>
                    </li>
                    <li><a href="{% url 'contact' %}">Contact</a></li>
                    
                </ul>
            </div>
        </nav>
    </header>

    <script>
        // Add scroll effect to header
        window.addEventListener('scroll', function() {
            const header = document.querySelector('header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            const toggle = document.querySelector('.menu-toggle');
            menu.classList.toggle('active');
            toggle.classList.toggle('active');
        }

        function toggleDropdown(event, element) {
            // Only prevent default and toggle on mobile
            if (window.innerWidth <= 640) {
                event.preventDefault();
                const parent = element.parentElement;
                parent.classList.toggle('dropdown-open');
            }
            // On desktop, let the link work normally (dropdown shows on hover)
        }

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const nav = document.querySelector('nav');
            const menu = document.getElementById('navMenu');
            const toggle = document.querySelector('.menu-toggle');
            
            if (!nav.contains(event.target) && menu.classList.contains('active')) {
                menu.classList.remove('active');
                toggle.classList.remove('active');
            }
        });

        // Close menu when window is resized to larger screen
        window.addEventListener('resize', function() {
            if (window.innerWidth > 640) {
                document.getElementById('navMenu').classList.remove('active');
                document.querySelector('.menu-toggle').classList.remove('active');
                // Close all dropdowns
                document.querySelectorAll('.has-dropdown').forEach(item => {
                    item.classList.remove('dropdown-open');
                });
            }
        });
    </script>
</body>
</html>
