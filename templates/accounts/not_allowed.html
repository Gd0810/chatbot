{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Access Restricted</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{% static 'ui/img/fav5.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --rb-primary: rgb(255, 60, 0);
      --rb-primary-dark: rgb(217, 38, 0);
      --rb-primary-darker: rgb(175, 20, 0);
      --rb-primary-darkest: rgb(67, 26, 0);
      --rb-white: #ffffff;
      --rb-text: #1f2937;
      --rb-subtext: #6b7280;
      --rb-border: rgba(255, 255, 255, 0.18);
      --rb-card-border: rgba(255, 60, 0, 0.12);
      --rb-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Outfit', sans-serif;
      color: var(--rb-text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 60, 0, 0.22), transparent 24%),
        radial-gradient(circle at bottom center, rgba(255, 255, 255, 0.1), transparent 26%),
        linear-gradient(135deg, var(--rb-primary-darkest) 0%, var(--rb-primary-darker) 55%, var(--rb-primary-dark) 100%);
      overflow: hidden;
      position: relative;
    }

    .page-shell {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      position: relative;
      z-index: 1;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(72px);
      opacity: 0.55;
      pointer-events: none;
    }

    .orb.one {
      width: 280px;
      height: 280px;
      top: 10%;
      left: -80px;
      background: rgba(255, 255, 255, 0.18);
    }

    .orb.two {
      width: 320px;
      height: 320px;
      top: -40px;
      right: -100px;
      background: rgba(255, 60, 0, 0.22);
    }

    .orb.three {
      width: 260px;
      height: 260px;
      bottom: -80px;
      left: 28%;
      background: rgba(255, 255, 255, 0.16);
    }

    .panel {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--rb-border);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: var(--rb-shadow);
      backdrop-filter: blur(10px);
    }

    .panel-topbar {
      height: 12px;
      background: linear-gradient(90deg, var(--rb-primary), var(--rb-primary-dark), var(--rb-primary-darker));
    }

    .panel-body {
      padding: 40px 32px 34px;
      text-align: center;
    }

    .icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .icon-outer {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255, 60, 0, 0.14), rgba(217, 38, 0, 0.18));
      box-shadow: inset 0 0 0 5px rgba(255, 60, 0, 0.08);
    }

    .icon-inner {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--rb-white);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 24px rgba(255, 60, 0, 0.14);
    }

    .icon-inner svg {
      width: 36px;
      height: 36px;
      color: var(--rb-primary);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: rgba(255, 60, 0, 0.1);
      color: var(--rb-primary-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .title {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #1f1f1f;
    }

    .title-rule {
      width: 88px;
      height: 6px;
      border-radius: 999px;
      margin: 0 auto 28px;
      background: linear-gradient(90deg, var(--rb-primary), var(--rb-primary-dark));
    }

    .message-box {
      margin-bottom: 28px;
      padding: 22px 20px;
      border-radius: 24px;
      background: #f9fafb;
      border: 1px solid var(--rb-card-border);
    }

    .message-box p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
      color: var(--rb-subtext);
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 15px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button-primary {
      background: var(--rb-primary);
      color: var(--rb-white);
      box-shadow: 0 14px 30px rgba(255, 60, 0, 0.24);
    }

    .button-primary:hover {
      background: var(--rb-primary-dark);
      box-shadow: 0 18px 34px rgba(217, 38, 0, 0.28);
    }

    .button-secondary {
      background: var(--rb-white);
      color: #374151;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .button-secondary:hover {
      border-color: rgba(255, 60, 0, 0.24);
      background: #fafafa;
    }

    .footer-note {
      margin: 22px 0 0;
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 24px 12px;
      }

      .panel {
        border-radius: 24px;
      }

      .panel-body {
        padding: 28px 18px 24px;
      }

      .icon-outer {
        width: 88px;
        height: 88px;
      }

      .icon-inner {
        width: 60px;
        height: 60px;
      }

      .icon-inner svg {
        width: 30px;
        height: 30px;
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.14em;
        padding: 8px 14px;
      }

      .title {
        font-size: 32px;
      }

      .message-box {
        padding: 18px 16px;
        border-radius: 18px;
      }

      .message-box p {
        font-size: 16px;
      }

      .actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <main class="page-shell">
    <section class="panel" aria-labelledby="restricted-title">
      <div class="panel-topbar"></div>

      <div class="panel-body">
        <div class="icon-wrap">
          <div class="icon-outer">
            <div class="icon-inner">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="eyebrow">Access Control</div>
        <h1 id="restricted-title" class="title">Access Restricted</h1>
        <div class="title-rule"></div>

        <div class="message-box">
          <p>{{ detail }}</p>
        </div>

        <div class="actions">
          <a class="button button-primary" href="/">Go to Home</a>
          <a class="button button-secondary" href="{% url 'accounts:logout' %}">Logout</a>
        </div>

        <p class="footer-note">If you think this is a mistake, please contact your workspace administrator.</p>
      </div>
    </section>
  </main>
</body>
</html>
