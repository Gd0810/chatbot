<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: rgb(255, 60, 0);
            --primary-dark: rgb(217, 38, 0);
            --primary-darker: rgb(175, 20, 0);
            --primary-darkest: rgb(67, 26, 0);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--primary);
            font-family: 'Outfit', sans-serif;
        }

        /* LARGE WINDOW CARD */
        .window-card {
            width: 90%;
            max-width: 900px; /* Increased size */
            background-color: rgba(255, 255, 255, 0.1); /* Blends with background */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px); /* Optional: adds a modern glassy feel */
        }

        /* Header Bar */
        .window-header {
            background-color: rgba(0, 0, 0, 0.15);
            padding: 15px 20px;
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
        }

        .window-content {
            padding: 80px 60px; /* More internal space */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Large Avatar */
        .avatar-circle {
            width: 100px;
            height: 100px;
            background-color: var(--primary-darkest);
            border-radius: 50%;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .avatar-circle svg {
            fill: white;
            width: 50px;
        }

        /* Large Inputs Styling */
        form {text-align: center; }
        
        input {
            width: 100%;
            max-width: 370px;
            padding: 18px; /* Larger padding */
            margin-bottom: 15px;
            border: none;
            border-radius: 4px;
            outline: none;
            font-size: 18px; /* Larger font */
            background-color: #f8f8f8;
            box-sizing: border-box;
        }

        /* THE STAR (*) MASKING */
        input[type="password"] {
            -webkit-text-security: asterisk !important;
        }

        /* Large Blue Button */
        button {
            width: 100%;
            max-width: 370px;
            padding: 18px;
            background-color: rgb(217, 38, 0);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: rgb(255, 60, 0);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="window-card">
        <div class="window-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="window-content">
            <div class="avatar-circle">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>

            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" id="pw-field" required>
                <br>
                <button type="submit">Continue</button>
            </form>
        </div>
    </div>

    <script>
        const pwField = document.getElementById('pw-field');
        pwField.addEventListener('input', function() {
            this.style.webkitTextSecurity = 'asterisk';
        });
    </script>

</body>
</html>
