<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background:
        radial-gradient(circle at 18% 20%, rgba(255, 98, 0, 0.6) 0%, rgba(255, 98, 0, 0) 42%),
        radial-gradient(circle at 90% 16%, rgba(253, 127, 44, 0.6) 0%, rgba(253, 127, 44, 0) 44%),
        radial-gradient(circle at 80% 86%, rgba(253, 147, 70, 0.72) 0%, rgba(253, 147, 70, 0) 50%),
        radial-gradient(circle at 28% 84%, rgba(253, 167, 102, 0.56) 0%, rgba(253, 167, 102, 0) 50%),
        linear-gradient(135deg, #ff6200 0%, #fd7f2c 32%, #fd9346 58%, #fda766 78%, #fdb777 100%);
}

.login-shell {
    width: min(92vw, 420px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.avatar {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    background: #0b2d67;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 16px 34px rgba(8, 19, 51, 0.42);
    margin-bottom: -52px;
    z-index: 2;
}

.card {
    width: 100%;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.55), rgba(253, 183, 119, 0.3));
    border: 1px solid rgba(255, 255, 255, 0.46);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 18px 36px rgba(16, 26, 64, 0.27);
    padding: 74px 36px 34px;
}

.field-wrap {
    display: flex;
    align-items: center;
    height: 44px;
    margin-bottom: 14px;
    overflow: hidden;
    background: #3d5f90;
}

.field-icon {
    width: 42px;
    min-width: 42px;
    height: 100%;
    background: #07265e;
    display: flex;
    align-items: center;
    justify-content: center;
}

.field-wrap input {
    width: 100%;
    height: 100%;
    border: 0;
    outline: 0;
    padding: 0 14px;
    color: #dbe7ff;
    background: transparent;
    font-size: 1.08rem;
    letter-spacing: 0.01em;
}

.field-wrap input::placeholder {
    color: rgba(223, 232, 251, 0.72);
}

.meta-row {
    margin-top: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 0.92rem;
    color: #6b7da3;
}

.remember {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.remember input {
    accent-color: #1d3f7b;
    width: 14px;
    height: 14px;
}

.forgot-link {
    color: #6e82ad;
    text-decoration: none;
    font-style: italic;
}

.forgot-link:hover {
    text-decoration: underline;
}

.message-box {
    margin-top: 12px;
}

.message-item {
    margin: 0 0 8px;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.86rem;
    color: #ffffff;
    background: rgba(181, 36, 36, 0.42);
}

.login-btn {
    margin-top: -2px;
    width: 78%;
    border: 0;
    border-radius: 0 0 22px 22px;
    padding: 17px 10px;
    background: linear-gradient(180deg, rgba(255, 236, 218, 0.96), rgba(253, 183, 119, 0.9));
    box-shadow: 0 15px 30px rgba(18, 35, 81, 0.34);
    color: #ffffff;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow: 0 1px 2px rgba(58, 83, 123, 0.6);
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
}

.login-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.03);
}

.login-btn:active {
    transform: translateY(0);
}

@media (max-width: 420px) {
    .card {
        padding: 74px 20px 28px;
    }

    .meta-row {
        font-size: 0.82rem;
    }
}
</style>
</head>
<body>
<div class="login-shell">
    <div class="avatar" aria-hidden="true">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.3">
            <circle cx="12" cy="8" r="4.3"></circle>
            <path d="M3.8 19.3c0-4.1 3.4-7 8.2-7s8.2 2.9 8.2 7"></path>
        </svg>
    </div>

    <div class="card">
        <form id="loginForm" method="post">
            {% csrf_token %}

            <div class="field-wrap">
                <div class="field-icon" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.6">
                        <circle cx="12" cy="8" r="3.4"></circle>
                        <path d="M5 20c0-3.2 2.8-5.6 7-5.6s7 2.4 7 5.6"></path>
                    </svg>
                </div>
                {{ form.username }}
            </div>
            {% for error in form.username.errors %}
            <p class="message-item">{{ error }}</p>
            {% endfor %}

            <div class="field-wrap">
                <div class="field-icon" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.6">
                        <rect x="5.5" y="11" width="13" height="8.5" rx="1.7"></rect>
                        <path d="M8.2 11V8.3a3.8 3.8 0 1 1 7.6 0V11"></path>
                    </svg>
                </div>
                {{ form.password }}
            </div>
            {% for error in form.password.errors %}
            <p class="message-item">{{ error }}</p>
            {% endfor %}

            {% if messages %}
            <div class="message-box">
                {% for message in messages %}
                <p class="message-item">{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}

        </form>
    </div>

    <button type="submit" form="loginForm" class="login-btn">Login</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const username = document.querySelector("input[name*='user'], input[type='text'], input[type='email']");
    const password = document.querySelector("input[type='password']");

    if (username) {
        username.placeholder = "Username";
        username.autocomplete = "username";
    }

    if (password) {
        password.placeholder = "Password";
        password.autocomplete = "current-password";
    }
});
</script>
</body>
</html>
