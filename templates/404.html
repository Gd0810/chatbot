{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{% static 'ui/img/fav5.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --rb-primary: rgb(255, 60, 0);
      --rb-primary-dark: rgb(217, 38, 0);
      --rb-primary-darker: rgb(175, 20, 0);
      --rb-primary-darkest: rgb(67, 26, 0);
      --rb-white: #ffffff;
      --rb-text: #1f2937;
      --rb-subtext: #6b7280;
      --rb-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Outfit', sans-serif;
      color: var(--rb-text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 60, 0, 0.22), transparent 24%),
        radial-gradient(circle at bottom center, rgba(255, 255, 255, 0.1), transparent 26%),
        linear-gradient(135deg, var(--rb-primary-darkest) 0%, var(--rb-primary-darker) 55%, var(--rb-primary-dark) 100%);
      overflow: hidden;
      position: relative;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(72px);
      opacity: 0.55;
      pointer-events: none;
    }

    .orb.one {
      width: 300px;
      height: 300px;
      top: 8%;
      left: -90px;
      background: rgba(255, 255, 255, 0.18);
    }

    .orb.two {
      width: 340px;
      height: 340px;
      top: -50px;
      right: -110px;
      background: rgba(255, 60, 0, 0.24);
    }

    .orb.three {
      width: 260px;
      height: 260px;
      bottom: -60px;
      left: 34%;
      background: rgba(255, 255, 255, 0.14);
    }

    .page-shell {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      position: relative;
      z-index: 1;
    }

    .panel {
      width: 100%;
      max-width: 820px;
      border-radius: 34px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--rb-shadow);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
    }

    .panel-topbar {
      height: 12px;
      background: linear-gradient(90deg, var(--rb-primary), var(--rb-primary-dark), var(--rb-primary-darker));
    }

    .panel-body {
      padding: 32px 28px 34px;
      text-align: center;
    }

    .image-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .image-shell {
      width: 100%;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-shell img {
      width: 100%;
      height: auto;
      max-width: 500px;
      display: block;
      border-radius: 28px;
      object-fit: contain;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: rgba(255, 60, 0, 0.1);
      color: var(--rb-primary-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .title {
      margin: 0 0 10px;
      font-size: 44px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #1f1f1f;
    }

    .subtitle {
      margin: 0 auto 16px;
      max-width: 640px;
      font-size: 18px;
      line-height: 1.7;
      color: var(--rb-subtext);
    }

    .title-rule {
      width: 88px;
      height: 6px;
      border-radius: 999px;
      margin: 0 auto 24px;
      background: linear-gradient(90deg, var(--rb-primary), var(--rb-primary-dark));
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 190px;
      padding: 15px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .button:hover { transform: translateY(-2px); }

    .button-primary {
      background: var(--rb-primary);
      color: var(--rb-white);
      box-shadow: 0 14px 30px rgba(255, 60, 0, 0.24);
    }

    .button-primary:hover {
      background: var(--rb-primary-dark);
      box-shadow: 0 18px 34px rgba(217, 38, 0, 0.28);
    }

    .button-secondary {
      background: var(--rb-white);
      color: #374151;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .button-secondary:hover {
      border-color: rgba(255, 60, 0, 0.24);
      background: #fafafa;
    }

    .footer-note {
      margin: 20px 0 0;
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .panel {
        border-radius: 24px;
      }

      .panel-body {
        padding: 24px 18px 28px;
      }

      .image-shell {
        width: min(100%, 250px);
        padding: 14px;
        border-radius: 22px;
      }

      .title {
        font-size: 32px;
      }

      .subtitle {
        font-size: 16px;
      }

      .actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <main class="page-shell">
    <section class="panel" aria-labelledby="not-found-title">
      <div class="panel-topbar"></div>
      <div class="panel-body">
        <div class="image-wrap">
          <div class="image-shell">
            <img src="{% static 'ui/img/fyu.png' %}" alt="Redback AI 404 Error">
          </div>
        </div>

        <div class="eyebrow">404 Error</div>
        <h1 id="not-found-title" class="title">Page Not Found</h1>
        <div class="title-rule"></div>
        <p class="subtitle">The page you’re looking for doesn’t exist, may have moved, or the URL may be incorrect.</p>

        <div class="actions">
          <a class="button button-primary" href="/">Go to Home</a>
          <a class="button button-secondary" href="/service/">View Services</a>
        </div>

        <p class="footer-note">Please check the URL and try again.</p>
      </div>
    </section>
  </main>
</body>
</html>
