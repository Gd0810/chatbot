<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
  <!-- Iconify for icons -->
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

<title>Login</title>

<style>
body {
    background: linear-gradient(
        135deg,
        rgb(255,60,0),
        rgb(217,38,0),
        rgb(175,20,0),
        rgb(67,26,0)
    );
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center font-sans">

<div class="relative flex flex-col items-center">

    <!-- Avatar -->
    <div class="w-24 h-24 bg-[#1e2d4a] rounded-full flex items-center justify-center shadow-xl z-10 -mb-12">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
    </div>

    <!-- Card -->
    <div class="w-[460px] bg-white/25 backdrop-blur-xl border border-white/40 rounded-3xl shadow-2xl pt-16 px-10">

        

        <form method="post">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-5">
                <div class="flex items-center bg-[#1e2d4a] rounded-xl overflow-hidden">
                    <div class="px-4 text-white/70"><iconify-icon icon="mingcute:user-4-fill"></iconify-icon></div>

                    {{ form.username }}
                </div>

                {% for error in form.username.errors %}
                <p class="text-red-200 text-xs mt-1">{{ error }}</p>
                {% endfor %}
            </div>

            <!-- Password -->
            <div class="mb-5">
                <div class="flex items-center bg-[#1e2d4a] rounded-xl overflow-hidden">
                    <div class="px-4 text-white/70"><iconify-icon icon="tabler:password-user" width="24" height="24"></iconify-icon></div>

                    {{ form.password }}
                </div>

                {% for error in form.password.errors %}
                <p class="text-red-200 text-xs mt-1">{{ error }}</p>
                {% endfor %}
            </div>

             {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <p class="bg-red-500/20 text-white text-sm p-2 rounded mb-2">
                {{ message }}
            </p>
            {% endfor %}
        </div>
        {% endif %}

            <!-- Bottom Strip -->
            <div class="-mx-10 bg-white/30 backdrop-blur-md border-t border-white/30 rounded-b-3xl py-5">
                <button type="submit"
                    class="w-full uppercase tracking-widest font-semibold text-[#1e2d4a] hover:text-black transition">
                    Login
                </button>
            </div>

        </form>

    </div>

</div>

<!-- Django input styling -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    const inputs = document.querySelectorAll("input[type=text], input[type=password]");

    inputs.forEach(input => {

        input.className =
            "w-full bg-transparent py-4 text-white/70 placeholder-white/40 focus:outline-none";

        if (!input.placeholder) {
            if (input.name.includes("user"))
                input.placeholder = "Username";
            else
                input.placeholder = "Password";
        }

    });

});
</script>

</body>
</html>
