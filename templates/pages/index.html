
{% extends "pages/base.html" %}
{% load static %}
{% block content %}
<style type="text/tailwindcss">
    @layer utilities {
        .text-primary {
            color: rgb(255, 60, 0);
        }
        .text-primary-dark {
            color: rgb(217, 38, 0);
        }
        .text-primary-darker {
            color: rgb(175, 20, 0);
        }
        .text-primary-darkest {
            color: rgb(67, 26, 0);
        }
        .bg-primary {
            background-color: rgb(255, 60, 0);
        }
        .bg-primary-dark {
            background-color: rgb(217, 38, 0);
        }
        .bg-primary-darker {
            background-color: rgb(175, 20, 0);
        }
        .bg-primary-darkest {
            background-color: rgb(67, 26, 0);
        }
        .wave-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .wave {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }
    }
</style>

<!-- Decorative Wave Patterns -->
<div class="wave-pattern">
    <!-- Top Left Wave -->
    <div class="wave bg-primary-dark w-96 h-96 -top-20 -left-20 lg:w-[500px] lg:h-[500px] lg:-top-32 lg:-left-32"></div>
    
    <!-- Top Right Wave -->
    <div class="wave bg-primary w-80 h-80 top-10 right-0 lg:w-[400px] lg:h-[400px] lg:top-20"></div>
    
    <!-- Bottom Left Wave -->
    <div class="wave bg-primary-darker w-72 h-72 bottom-20 left-10 lg:w-[350px] lg:h-[350px]"></div>
    
    <!-- Bottom Right Wave -->
    <div class="wave bg-primary-dark w-64 h-64 -bottom-10 -right-10 lg:w-[300px] lg:h-[300px]"></div>
    
    <!-- Additional decorative dots -->
    <div class="absolute top-32 right-20 hidden lg:block">
        <div class="grid grid-cols-3 gap-3">
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
            <div class="w-3 h-3 rounded-full bg-primary opacity-30"></div>
        </div>
    </div>
</div>

<!-- Main Landing Section -->
<section class="relative z-10 min-h-screen flex items-center py-20 px-6 sm:px-8 lg:px-16">
    <div class="container mx-auto max-w-7xl">
        <div class="grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
            
            <!-- Left Side Content -->
            <div class="space-y-8">
                <div class="space-y-6">
                    <h1 class="text-5xl sm:text-6xl lg:text-7xl font-bold leading-tight">
                        <span class="text-primary-darkest">VIRTUAL</span><br>
                        <span class="text-primary">ASSISTANT</span>
                    </h1>
                    <p class="text-lg sm:text-xl lg:text-2xl text-gray-600 leading-relaxed max-w-xl">
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt.
                    </p>
                </div>

                <div class="space-y-5 pt-4">
                    <div class="flex items-center gap-4">
                        <svg class="w-7 h-7 text-primary flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <p class="text-primary-darkest text-lg font-medium">Intelligent automation</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <svg class="w-7 h-7 text-primary flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <p class="text-primary-darkest text-lg font-medium">Natural conversation</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <svg class="w-7 h-7 text-primary flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <p class="text-primary-darkest text-lg font-medium">Seamless integration</p>
                    </div>
                </div>
            </div>

            <!-- Right Side Image -->
            <div class="flex justify-center lg:justify-end">
                <div class="w-full max-w-2xl">
                    <img src="{% static 'ui/img/home2.png' %}" alt="Virtual Assistant Illustration" class="w-full h-auto object-contain">
                </div>
            </div>

        </div>
    </div>
</section>


{% endblock %}
