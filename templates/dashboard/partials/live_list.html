<!-- dashboard/partials/live_list.html -->
{% for conv in conversations %}
<div class="conversation-item relative group transition-colors duration-200" 
     style="padding: 16px; border-bottom: 1px solid var(--style-border); {% if selected_id == conv.id %}background-color: var(--style-info-bg); border-left: 4px solid var(--style-accent);{% else %}border-left: 4px solid transparent;{% endif %}"
     onclick="document.getElementById('chat-area').classList.add('active')"
     onmouseover="this.style.backgroundColor = '{% if selected_id == conv.id %}' + getComputedStyle(document.documentElement).getPropertyValue('--style-info-bg') + '{% else %}' + getComputedStyle(document.documentElement).getPropertyValue('--style-info-bg') + '{% endif %}'"
     onmouseout="this.style.backgroundColor = '{% if selected_id == conv.id %}' + getComputedStyle(document.documentElement).getPropertyValue('--style-info-bg') + '{% else %}transparent{% endif %}'">
  
  <div class="cursor-pointer"
       hx-get="{% url 'dashboard:live_chat_detail' conv.id %}"
       hx-target="#chat-area"
       hx-swap="innerHTML">
    <div class="flex justify-between items-start mb-1">
      <div class="font-medium truncate w-32" style="color: var(--style-text-primary); font-size: 15px;">
        {{ conv.session_id|truncatechars:10 }}
      </div>
      <div class="text-xs" style="color: var(--style-text-secondary);">
        {{ conv.updated_at|timesince }} ago
      </div>
    </div>
    <div class="text-xs mt-1 truncate" style="color: var(--style-text-secondary);">
      {{ conv.last_message|default:"No messages" }}
    </div>
    <div class="mt-2 flex gap-1">
      <span class="px-1.5 py-0.5 text-[10px] rounded flex items-center gap-1" style="background-color: rgba(52, 168, 83, 0.1); color: var(--style-success);">
        <iconify-icon icon="material-symbols:circle" width="6"></iconify-icon> Live
      </span>
      <span class="px-1.5 py-0.5 text-[10px] rounded" style="background-color: var(--style-bg); color: var(--style-text-secondary);">
        {{ conv.bot.name }}
      </span>
    </div>
  </div>
  
  <!-- Delete Button -->
  <button class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity rounded p-1.5 flex items-center justify-center"
          style="background-color: #ef4444; color: white;"
          hx-delete="{% url 'dashboard:live_chat_delete' conv.id %}"
          hx-confirm="Are you sure you want to delete this conversation?"
          hx-target="#conversation-list"
          hx-swap="innerHTML"
          title="Delete conversation"
          onclick="event.stopPropagation()">
    <iconify-icon icon="material-symbols:delete-outline" width="14"></iconify-icon>
  </button>
</div>
{% empty %}
<div class="p-8 text-center text-sm" style="color: var(--style-text-secondary);">
  <iconify-icon icon="material-symbols:chat-bubble-outline-off" width="24" class="mb-2 opacity-50"></iconify-icon>
  <div>No active live conversations.</div>
</div>
{% endfor %}
