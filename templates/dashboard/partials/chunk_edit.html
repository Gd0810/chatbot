<!-- templates/dashboard/partials/chunk_edit.html -->
{% include 'toast.html' %}

<style>
  :root {
    --style-bg: #f8f9fa;
    --style-card-bg: #ffffff;
    --style-text-primary: #1f1f1f;
    --style-text-secondary: #5f6368;
    --style-border: #e0e0e0;
    --style-accent: #1a73e8;
    --style-accent-hover: #1557b0;
    --style-success: #34a853;
    --style-info-bg: #f1f3f4;
    --style-shadow: rgba(0, 0, 0, 0.1);
    --style-shadow-hover: rgba(0, 0, 0, 0.15);
  }
  
  [data-theme="dark"] {
    --style-bg: #1f1f1f;
    --style-card-bg: #2d2d2d;
    --style-text-primary: #e8eaed;
    --style-text-secondary: #9aa0a6;
    --style-border: #3c4043;
    --style-accent: #8ab4f8;
    --style-accent-hover: #aecbfa;
    --style-success: #81c995;
    --style-info-bg: #3c4043;
    --style-shadow: rgba(0, 0, 0, 0.3);
    --style-shadow-hover: rgba(0, 0, 0, 0.4);
  }

  .style-container {
    background-color: var(--style-card-bg);
    color: var(--style-text-primary);
    font-family: 'Outfit', sans-serif;
    border: 1px solid var(--style-border);
    border-radius: 12px;
  }
  
  .style-input {
    background-color: var(--style-bg);
    border: 1px solid var(--style-border);
    color: var(--style-text-primary);
    border-radius: 8px;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  
  .style-input:focus {
    border-color: var(--style-accent);
    box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
  }
  
  .style-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--style-text-secondary);
  }
  
  .style-btn-primary {
    background-color: var(--style-accent);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  
  .style-btn-secondary {
    background-color: transparent;
    border: 1px solid var(--style-border);
    color: var(--style-text-secondary);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  
  .style-btn-secondary:hover {
    background-color: var(--style-accent);
    color: white;
    border-color: var(--style-accent);
  }
</style>

<div class="style-container p-4 md:p-6 shadow-sm">
  <div class="flex items-center gap-3 mb-6">
    <div class="p-2 rounded-lg" style="background-color: var(--style-info-bg); color: var(--style-accent);">
      <iconify-icon icon="material-symbols:edit-square-outline" width="24"></iconify-icon>
    </div>
    <h2 class="text-xl font-semibold">Edit Chunk #{{ chunk.id }}</h2>
  </div>

  <form method="post"
        hx-post="{% url 'dashboard:chunk_update' ks.id chunk.id %}"
        hx-target="#main" class="space-y-6"
        data-processing-message="Processing chunk update request...">
    {% csrf_token %}

    <div>
      <label class="style-label">Chunk Text</label>
      <textarea name="text" rows="8" class="style-input" style="font-family: monospace; line-height: 1.5;">{{ chunk.text }}</textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="style-label">Qdrant URL</label>
        <input name="qdrant_url" value="{{ chunk.qdrant_url|default_if_none:'' }}" class="style-input" placeholder="http://..."/>
        {% if workspace.qdrant_url %}
          <p class="text-[11px] mt-1 flex items-center gap-1" style="color: var(--style-text-secondary);">
             <iconify-icon icon="material-symbols:info-outline" width="12"></iconify-icon>
             Workspace Default: {{ workspace.qdrant_url }}
          </p>
        {% endif %}
      </div>
      <div>
        <label class="style-label">Qdrant API Key</label>
        <input name="qdrant_api_key" value="{{ chunk.qdrant_api_key|default_if_none:'' }}" class="style-input" placeholder="API Key..."/>
        {% if workspace.qdrant_api_key %}
           <p class="text-[11px] mt-1 flex items-center gap-1" style="color: var(--style-text-secondary);">
             <iconify-icon icon="material-symbols:check-circle-outline" width="12"></iconify-icon>
             Workspace Default: Configured
           </p>
        {% endif %}
      </div>
    </div>

    <div class="flex gap-3 justify-end pt-4 border-t" style="border-color: var(--style-border);">
      <button class="style-btn-secondary"
              hx-get="{% url 'dashboard:chunks_list' ks.id %}" hx-target="#main" type="button">
              <iconify-icon icon="material-symbols:arrow-back" width="20"></iconify-icon>
              Back
      </button>
      <button class="style-btn-primary" type="submit">
        <iconify-icon icon="material-symbols:save-outline" width="20"></iconify-icon>
        Save Changes
      </button>
    </div>
  </form>
</div>
