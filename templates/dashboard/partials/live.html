
<style>
  :root {
    --style-bg: #f8f9fa;
    --style-card-bg: #ffffff;
    --style-text-primary: #1f1f1f;
    --style-text-secondary: #5f6368;
    --style-border: #e0e0e0;
    --style-accent: #1a73e8;
    --style-accent-hover: #1557b0;
    --style-success: #34a853;
    --style-info-bg: #f1f3f4;
    --style-shadow: rgba(0, 0, 0, 0.1);
    --style-shadow-hover: rgba(0, 0, 0, 0.15);
  }
  
  [data-theme="dark"] {
    --style-bg: #1f1f1f;
    --style-card-bg: #2d2d2d;
    --style-text-primary: #e8eaed;
    --style-text-secondary: #9aa0a6;
    --style-border: #3c4043;
    --style-accent: #8ab4f8;
    --style-accent-hover: #aecbfa;
    --style-success: #81c995;
    --style-info-bg: #3c4043;
    --style-shadow: rgba(0, 0, 0, 0.3);
    --style-shadow-hover: rgba(0, 0, 0, 0.4);
  }

  .live-container {
    background-color: var(--style-card-bg);
    border: 1px solid var(--style-border);
    border-radius: 0.75rem;
    overflow: hidden;
    height: calc(100vh - 100px);
    display: flex;
    flex-direction: column;
    font-family: 'Outfit', sans-serif;
    margin-bottom: 2rem; /* Added extra bottom margin */
  }
  
  .live-sidebar {
    background-color: var(--style-card-bg);
    border-right: 1px solid var(--style-border);
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }

  .live-header {
    padding: 16px;
    border-bottom: 1px solid var(--style-border);
    background-color: var(--style-card-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .live-title {
    font-weight: 600;
    color: var(--style-text-primary);
  }

  .live-refresh {
    font-size: 0.75rem;
    color: var(--style-accent);
    cursor: pointer;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 6px;
    transition: background-color 0.2s;
  }
  
  .live-refresh:hover {
    background-color: var(--style-info-bg);
  }
  
  .live-list {
    flex: 1;
    overflow-y: auto;
    background-color: var(--style-card-bg);
    padding-bottom: 1rem; /* Extra padding for list end */
  }
  
  .live-chat-area {
    background-color: var(--style-bg);
    display: flex;
    flex-direction: column;
    flex: 1;
    height: 100%;
    position: relative;
    padding-bottom: 1rem; /* Extra bottom padding */
  }

  /* Desktop Layout */
  @media (min-width: 768px) {
    .live-container {
      flex-direction: row;
    }
    .live-sidebar {
      width: 320px;
      flex-shrink: 0;
    }
    .live-chat-area {
      flex: 1;
      width: auto;
    }
  }

  /* Mobile Layout - Sidebar Hidden when Chat Active */
  @media (max-width: 767px) {
    .live-container {
      height: calc(100vh - 70px); /* Taller on mobile */
      border: none;
      border-radius: 0;
    }
    
    .live-sidebar {
      width: 100%;
      display: flex; /* Default show sidebar */
    }
    
    .live-chat-area {
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 50;
      transform: translateX(100%);
      transition: transform 0.3s ease-in-out;
    }
    
    .live-chat-area.active {
      transform: translateX(0);
      position: relative;
    }
    
    /* Hide sidebar when chat is active */
    .live-chat-area.active ~ .live-sidebar,
    body:has(.live-chat-area.active) .live-sidebar {
      display: none;
    }
  }
</style>

<div class="live-container shadow-lg">
  <!-- Sidebar: Conversation List -->
  <div class="live-sidebar">
    <div class="live-header">
      <h2 class="live-title">Conversations</h2>
      <button class="live-refresh" 
              hx-get="{% url 'dashboard:partial_live' %}" 
              hx-target="#main" 
              hx-swap="innerHTML">
              <span class="flex items-center gap-1">
                <iconify-icon icon="material-symbols:refresh" width="16"></iconify-icon>
                
              </span>
      </button>
    </div>
    <div class="live-list" id="conversation-list"
         hx-get="{% url 'dashboard:live_chat_list' %}" 
         hx-trigger="load, every 5s">
      <!-- Loaded via HTMX -->
      <div class="p-8 text-center text-sm" style="color: var(--style-text-secondary);">
        <iconify-icon icon="line-md:loading-twotone-loop" width="24" class="mb-2"></iconify-icon>
        <div>Loading conversations...</div>
      </div>
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="live-chat-area" id="chat-area">
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center" style="color: var(--style-text-secondary);">
      <div class="p-4 rounded-full mb-4" style="background-color: var(--style-info-bg); color: var(--style-accent);">
         <iconify-icon icon="material-symbols:chat-bubble-outline" width="48"></iconify-icon>
      </div>
      <h3 class="text-lg font-medium mb-1" style="color: var(--style-text-primary);">No Chat Selected</h3>
      <p class="text-sm">Select a conversation to start messaging</p>
    </div>
  </div>
</div>
